<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathGenius 2.0 - Edisi Suara Malaysia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f19; color: #cbd5e1; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-4xl mx-auto bg-slate-900 p-8 rounded-3xl border border-slate-800">
        <h2 class="text-2xl font-bold text-white mb-6">Tetapan Suara (Pilih Suara Melayu)</h2>
        
        <!-- Pemilih Suara -->
        <div class="mb-6">
            <label class="block text-sm font-bold text-slate-400 mb-2">Pilih Suara (Jika anda sudah muat turun Bahasa Melayu):</label>
            <select id="voiceSelect" class="w-full bg-slate-800 text-white p-4 rounded-xl border border-slate-700 font-bold">
                <option value="">-- Mencari suara Bahasa Melayu... --</option>
            </select>
        </div>

        <button id="btnDengar" onclick="ujiSuara()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white p-5 rounded-2xl font-black transition-all">
            <i class="fa-solid fa-volume-high mr-2"></i> Dengar Contoh Ayat
        </button>

        <p class="mt-4 text-xs text-slate-500 italic text-center">
            Nota: Jika senarai di atas kosong, sila tutup dan buka semula pelayar web (Chrome/Edge) anda.
        </p>
    </div>

    <script>
        const voiceSelect = document.getElementById('voiceSelect');
        let voices = [];

        function populateVoices() {
            voices = window.speechSynthesis.getVoices();
            voiceSelect.innerHTML = '<option value="">-- Sila Pilih Suara --</option>';
            
            // Cari suara Melayu Malaysia dahulu
            voices.forEach((voice, i) => {
                const isMalay = voice.lang.toLowerCase().includes('ms') || voice.name.toLowerCase().includes('malay');
                if (isMalay) {
                    const option = document.createElement('option');
                    option.textContent = `${voice.name} (${voice.lang})`;
                    option.value = i;
                    voiceSelect.appendChild(option);
                }
            });
        }

        // Jalankan bila suara sedia
        window.speechSynthesis.onvoiceschanged = populateVoices;
        populateVoices();

        function ujiSuara() {
            const msg = new SpeechSynthesisUtterance("Selamat datang ke rumah nombor. Mari belajar matematik dengan seronok.");
            const selectedVoiceIndex = voiceSelect.value;
            
            if (selectedVoiceIndex !== "") {
                msg.voice = voices[selectedVoiceIndex];
            } else {
                // Cuba cari suara Melayu secara paksa jika pengguna belum pilih
                const defaultMalay = voices.find(v => v.lang.toLowerCase().includes('ms-my'));
                if (defaultMalay) msg.voice = defaultMalay;
            }
            
            msg.lang = 'ms-MY';
            window.speechSynthesis.speak(msg);
        }
    </script>
</body>
</html>
